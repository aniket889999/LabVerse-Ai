version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: labverse-postgres
    environment:
      POSTGRES_USER: labverse_user
      POSTGRES_PASSWORD: labverse_password
      POSTGRES_DB: labverse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
